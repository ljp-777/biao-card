function randomCard(exclude){
  if(cards.length<=1) return 0;
  let i;
  do{i=Math.floor(Math.random()*cards.length)}while(i===exclude);
  return i;
}
function pickImg(seed){
  let h=0;
  for(let i=0;i<seed.length;i++) h=(h*31+seed.charCodeAt(i))|0;
  return IMGS[Math.abs(h)%IMGS.length];
}
function matchReply(input,exclude){
  const t=input.trim();
  if(!t) return randomCard(exclude);
  const hits=new Set();
  for(const r of REPLY_RULES){
    if(r.kw.some(k=>t.includes(k))) r.idx.forEach(i=>{if(i<cards.length)hits.add(i)});
  }
  let best=-1,bestS=0;
  for(let i=0;i<cards.length;i++){
    let s=hits.has(i)?80:0;
    for(let j=0;j<t.length-1;j++){
      const bg=t.slice(j,j+2);
      if(cards[i].q.includes(bg)) s+=5;
    }
    for(let j=0;j<cards[i].q.length-1;j++){
      const bg=cards[i].q.slice(j,j+2);
      if(t.includes(bg)) s+=3;
    }
    if(s>bestS){bestS=s;best=i;}
  }
  if(hits.size) return [...hits][Math.floor(Math.random()*hits.size)];
  if(bestS>=8) return best;
  return randomCard(exclude);
}
function matchReplyAlt(input,exclude){
  const t=input.trim();
  const pool=new Set();
  for(const r of REPLY_RULES){
    if(r.kw.some(k=>t.includes(k))) r.idx.forEach(i=>{if(i<cards.length&&i!==exclude)pool.add(i)});
  }
  if(pool.size) return [...pool][Math.floor(Math.random()*pool.size)];
  return randomCard(exclude);
}

  },300);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function frameCanvas(src){
  const pad=32,border=5,r=10;
  const out=document.createElement('canvas');
  out.width=src.width+pad*2;
  out.height=src.height+pad*2;
  const ctx=out.getContext('2d');
  ctx.drawImage(src,pad,pad);
  roundRect(ctx,pad-border/2,pad-border/2,src.width+border,src.height+border,r);
  const bd=ctx.createLinearGradient(0,0,out.width,out.height);
  bd.addColorStop(0,'#d4a84b');
  bd.addColorStop(.4,'#8fd4a8');
  bd.addColorStop(.7,'#2d6a4f');
  bd.addColorStop(1,'#d4a84b');
  ctx.strokeStyle=bd;
  ctx.lineWidth=border;
  ctx.stroke();
  return out;
}
async function copyShareImage(){
  const stack=document.getElementById('cardStack');
  const actions=document.getElementById('cardActions');
  actions.classList.add('hidden');
  try{
    await document.fonts.ready;
    const raw=await html2canvas(stack,{
      scale:2,
      useCORS:true,
      allowTaint:true,
      backgroundColor:null,
      logging:false
    });
    const canvas=frameCanvas(raw);
    const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
    if(navigator.clipboard&&window.ClipboardItem){
      await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
      toast('图片已复制，去粘贴发给好友');
    }else{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='彪哥回复.png';
      a.click();
      toast('已下载图片，可发给好友');
    }
  }catch(e){
    toast('复制失败，请长按保存');
  }finally{

  }
}
