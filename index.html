let last=-1;
const card=document.getElementById('card');
const imgEl=document.getElementById('img');
const imgLabel=document.getElementById('imgLabel');
const quote=document.getElementById('quote');
const who=document.getElementById('who');
const ep=document.getElementById('ep');
document.getElementById('totalNum').textContent=cards.length;
function show(i){
  const c=cards[i];
  card.style.setProperty('--tilt',(Math.random()*3-1.5).toFixed(1)+'deg');
  imgEl.style.backgroundImage='url("'+IMGS[Math.floor(Math.random()*IMGS.length)]+'")';
  imgLabel.textContent=c.who;
  quote.textContent=c.q;
  who.textContent='— '+c.who;
  ep.textContent=c.ep;
}
function draw(){
  let i;
  do{i=Math.floor(Math.random()*cards.length)}while(i===last&&cards.length>1);
  last=i;
  card.classList.add('flip-out');
  setTimeout(()=>{
    show(i);
    card.classList.remove('flip-out');
    card.classList.remove('flip-in');
    void card.offsetWidth;
    card.classList.add('flip-in');
  },300);
}
document.getElementById('btn').onclick=draw;
document.getElementById('ver').textContent='v'+new Date().toISOString().slice(0,10).replace(/-/g,'.')+'.'+String(cards.length).padStart(3,'0');
draw();
